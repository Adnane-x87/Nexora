<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NEXORA — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="login.css"/>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <div class="login-wrap">
    <a href="index.html" class="login-logo">NEX<span>ORA</span></a>
    <p class="login-tagline">Sign in to your account</p>

    <div class="login-card">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="loginEmail" placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="pass-wrap">
          <input type="password" class="form-input" id="loginPass" placeholder="••••••••"/>
          <button class="pass-toggle" data-target="loginPass">👁</button>
        </div>
      </div>
      <div class="form-error" id="loginError"></div>
      <button class="btn-login" id="loginBtn">Sign In</button>
      <div class="login-footer">Don't have an account? <a href="register.html">Register</a></div>
    </div>

    <div class="back-link"><a href="index.html">← Back to Store</a></div>
  </div>

  <script src="login.js"></script>
</body>
</html>
